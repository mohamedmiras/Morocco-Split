<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient: Deep Slate to Indigo for a premium Fintech feel -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    
    <!-- Vibrant Gradients for the 3 overlapping overlapping circles (representing sharing/splitting) -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Deep Drop Shadow for 3D effect -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- iOS-style Rounded App Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- The Group Share / Split Graphic -->
  <g filter="url(#shadow)" style="mix-blend-mode: screen;">
    <!-- Top Left Circle (Vibrant Blue) -->
    <circle cx="200" cy="200" r="100" fill="url(#grad1)" opacity="0.9" />
    
    <!-- Top Right Circle (Vibrant Pink) -->
    <circle cx="312" cy="200" r="100" fill="url(#grad2)" opacity="0.9" />
    
    <!-- Bottom Center Circle (Vibrant Green) -->
    <circle cx="256" cy="296" r="100" fill="url(#grad3)" opacity="0.9" />
  </g>

  <!-- Central Moroccan Star (Pentagram overlay to ground it in Morocco) -->
  <g transform="translate(256, 240) scale(1.6)">
    <!-- Thin glowing Moroccan star -->
    <polygon 
      points="0,-30 8,-10 30,-10 12,5 18,25 0,15 -18,25 -12,5 -30,-10 -8,-10" 
      fill="none" 
      stroke="rgba(255, 255, 255, 0.95)" 
      stroke-width="2.5" 
      stroke-linejoin="round"
      filter="drop-shadow(0px 2px 8px rgba(255,255,255,0.4))"
    />
  </g>
</svg>